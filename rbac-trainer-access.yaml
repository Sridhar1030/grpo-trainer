apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeflow-trainer-user
rules:
- apiGroups: ["trainer.kubeflow.org"]
  resources: ["trainjobs", "trainingruntimes", "clustertrainingruntimes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["jobset.x-k8s.io"]
  resources: ["jobsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grpoxtrainer-trainer-access
subjects:
- kind: ServiceAccount
  name: grpoxtrainerwb1
  namespace: grpoxtrainer
roleRef:
  kind: ClusterRole
  name: kubeflow-trainer-user
  apiGroup: rbac.authorization.k8s.io
